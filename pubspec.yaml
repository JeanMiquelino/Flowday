name: flowday
description: "Your day, in flow — assistente de produtividade com IA."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.1

  # Navigation
  go_router: ^14.6.1

  # HTTP client
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2

  # Local database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^18.0.0

  # Fonts & Theme
  google_fonts: ^6.2.1
  adaptive_theme: ^3.6.0

  # Utilities
  flutter_native_splash: ^2.4.3
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.0.0
  path_provider: ^2.1.0
  path: ^1.9.0
  image: ^4.2.0
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "Logo.png"
  windows:
    generate: true
    image_path: "Logo.png"
  image_path: "Logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#1D9E75"
  image: Logo.png
  color_dark: "#085041"
  image_dark: Logo.png
  android_12:
    color: "#1D9E75"
    icon_background_color: "#1D9E75"
    image: Logo.png
    color_dark: "#085041"
    icon_background_color_dark: "#085041"
    image_dark: Logo.png
  web: true

flutter:
  uses-material-design: true
  assets:
    - Logo.png
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 500
